<!DOCTYPE html>
<html>
<head>
    <title>Add Course</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Add New Course</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="courses.html">Courses</a>
    <a href="add-course.html">Add Course</a>
    <a href="contact.html">Contact</a>
</nav>

<main>

<p>
    Use this form to add a new course. Fill in all fields to keep your course list complete and organized.
</p>

<form>
    <label>Course Name:</label>
    <input type="text" name="course" placeholder="e.g. Web Development" required>

    <label>Instructor Name:</label>
    <input type="text" name="instructor" placeholder="e.g. Dr. Ahmed" required>

    <label>Credit Hours:</label>
    <input type="number" name="credits" required>

    <label>Notes:</label>
    <textarea rows="4" name="notes" placeholder="Enter course notes..."></textarea>

    <button type="submit">Submit</button>
</form>

</main>

<footer>
    <p>Designed by Yousef Hamid - 2026 Course Organizer</p>
</footer>

</body>
</html>
